<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vocabulary Explorer Prototype</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --phone: #ffffff;
      --surface: #ffffff;
      --surface-2: #f1f5f9;
      --border: #d8dee9;
      --text: #1f2937;
      --muted: #6b7280;
      --brand: #2563eb;
      --brand-soft: #dbeafe;
      --accent: #f59e0b;
      --success: #16a34a;
      --danger: #dc2626;
      --warning: #fef3c7;
      --warning-text: #92400e;
      --shadow: 0 18px 50px rgba(15, 23, 42, 0.12);
      --radius: 24px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, #dbeafe 0%, transparent 28%),
        radial-gradient(circle at bottom right, #fef3c7 0%, transparent 26%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .app-shell {
      width: min(470px, 100%);
      display: grid;
      justify-items: center;
    }

    .phone {
      width: 100%;
      max-width: 470px;
      height: 800px;
      background: var(--phone);
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: 36px;
      box-shadow: var(--shadow);
      overflow: hidden;
      position: sticky;
      top: 24px;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    .status {
      height: 28px;
      padding: 8px 18px 0;
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 12px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 18px 16px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #fff, #fbfdff);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .logo {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--brand), #1d4ed8);
      color: white;
      display: grid;
      place-items: center;
      font-weight: 800;
      letter-spacing: -0.04em;
      box-shadow: inset 0 1px 1px rgba(255,255,255,.24);
      flex-shrink: 0;
    }

    .brand-text h1 {
      margin: 0;
      font-size: 19px;
      line-height: 1.05;
      letter-spacing: -0.02em;
    }

    .brand-text p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .header-mode {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(255,255,255,0.92);
      flex-shrink: 0;
    }

    .header-mode-label {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      line-height: 1.1;
      min-width: 0;
    }

    .header-mode-label strong {
      font-size: 12px;
      font-weight: 700;
    }

    .header-mode-label span {
      font-size: 11px;
      color: var(--muted);
    }

    .header-mode .toggle-track {
      width: 54px;
      height: 28px;
    }

    .header-mode .toggle-thumb {
      top: 3px;
      left: 3px;
      width: 20px;
      height: 20px;
    }

    .header-mode .toggle-switch input:checked + .toggle-track .toggle-thumb {
      left: 29px;
    }

    .icon-btn:hover,
    .chip:hover,
    .nav-item:hover,
    .list-row:hover,
    .collection-card:hover,
    .result-card:hover,
    .bookmark-card:hover,
    .action-card:hover,
    .choice:hover,
    .small-btn:hover,
    .toggle-switch:hover .toggle-track {
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(15, 23, 42, 0.08);
    }

    .screen {
      overflow: auto;
      padding: 16px 18px 132px;
      background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
    }

    .section-title {
      font-size: 28px;
      margin: 4px 0 8px;
      letter-spacing: -0.03em;
    }

    .subtle {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .search-box {
      margin-top: 18px;
      display: flex;
      gap: 12px;
      align-items: center;
      border: 2px solid var(--border);
      border-radius: 20px;
      padding: 12px 14px;
      background: white;
      box-shadow: 0 12px 30px rgba(37, 99, 235, 0.08);
    }

    .search-box input,
    .inline-input,
    textarea,
    select {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text);
      font-size: 17px;
      font-family: inherit;
    }

    textarea {
      resize: vertical;
      min-height: 90px;
      background: white;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px 14px;
    }

    .icon-btn {
      border: none;
      background: var(--brand-soft);
      color: var(--brand);
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-size: 20px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .icon-btn:disabled {
      cursor: default;
      background: #dcfce7;
      color: #15803d;
      box-shadow: none;
      transform: none;
    }

    .hero-card,
    .panel,
    .result-card,
    .bookmark-card,
    .collection-card,
    .action-card,
    .settings-card,
    .detail-card,
    .expert-card {
      background: rgba(255,255,255,0.95);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 16px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.05);
    }

    .hero-card {
      margin-top: 18px;
      background: linear-gradient(135deg, #eff6ff, #ffffff 55%, #fffbeb);
    }

    .hero-card h3,
    .panel h3,
    .settings-card h3,
    .detail-card h3 {
      margin: 0 0 8px;
      font-size: 18px;
      letter-spacing: -0.02em;
    }

    .chip-row,
    .tag-row,
    .row-actions,
    .inline-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .chip,
    .small-btn,
    .tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      background: white;
      color: var(--text);
      border-radius: 999px;
      padding: 10px 14px;
      font: inherit;
      cursor: pointer;
      transition: .18s ease;
    }

    .chip.active,
    .tag.active,
    .nav-item.active {
      background: var(--brand-soft);
      color: var(--brand);
      border-color: #bfdbfe;
    }

    .results,
    .stack,
    .settings-stack,
    .bookmarks-list {
      margin-top: 16px;
      display: grid;
      gap: 14px;
    }

    .result-card,
    .bookmark-card,
    .action-card,
    .collection-card {
      cursor: pointer;
      transition: .18s ease;
    }

    .result-card h4,
    .bookmark-card h4,
    .collection-card h4,
    .detail-header h2 {
      margin: 0;
      font-size: 20px;
      letter-spacing: -0.02em;
      min-width: 0;
    }

    .result-card .word-copy strong {
      display: block;
      font-size: 22px;
      font-weight: 600;
      line-height: 1.2;
    }

    .result-card .word-definition {
      margin-top: 4px;
      font-size: 14px;
      line-height: 1.35;
      color: var(--text);
    }

    .result-top,
    .bookmark-top,
    .detail-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
      min-width: 0;
    }

    .bookmark-top > :first-child,
    .result-top > :first-child,
    .detail-top > :first-child {
      min-width: 0;
    }

    .count-badge,
    .warning-badge,
    .mode-badge,
    .expert-badge {
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .count-badge {
      background: #eef2ff;
      color: #4338ca;
    }

    .warning-badge {
      background: var(--warning);
      color: var(--warning-text);
    }

    .mode-badge {
      background: #ecfdf5;
      color: #166534;
    }

    .expert-badge {
      background: #f5f3ff;
      color: #6d28d9;
    }

    .collection-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 18px;
    }

    .collection-card {
      min-height: 112px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: linear-gradient(180deg, white, #f8fbff);
      overflow: hidden;
    }

    .collection-icon {
      width: 28px;
      flex-shrink: 0;
      text-align: right;
      font-size: 22px;
      line-height: 1;
    }

    .collection-meta {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: stretch;
      color: var(--muted);
      font-size: 13px;
    }

    .collection-meta .small-btn {
      width: 100%;
    }

    .collection-meta .count-badge,
    .collection-meta .warning-badge {
      max-width: 100%;
      white-space: normal;
      line-height: 1.35;
    }

    .setting-group {
      border-top: 1px solid #e5e7eb;
      padding-top: 16px;
      margin-top: 8px;
    }

    .setting-group:first-child {
      border-top: none;
      padding-top: 0;
      margin-top: 0;
    }

    .choice-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .choice {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 12px;
      background: white;
      border: 1px solid var(--border);
      border-radius: 16px;
      cursor: pointer;
      transition: .18s ease;
    }

    .radio {
      width: 18px;
      height: 18px;
      border-radius: 999px;
      border: 2px solid #94a3b8;
      display: inline-grid;
      place-items: center;
      flex-shrink: 0;
    }

    .radio::after {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: transparent;
    }

    .choice.selected .radio {
      border-color: var(--brand);
    }

    .choice.selected .radio::after {
      background: var(--brand);
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 0 6px;
    }

    .toggle-switch {
      display: inline-grid;
      position: relative;
      cursor: pointer;
    }

    .toggle-switch input {
      position: absolute;
      inset: 0;
      opacity: 0;
      margin: 0;
      cursor: pointer;
    }

    .toggle-track {
      width: 110px;
      height: 46px;
      border-radius: 999px;
      background: #e5eefc;
      border: 1px solid #c7d2fe;
      transition: .18s ease;
      flex-shrink: 0;
    }

    .toggle-thumb {
      position: absolute;
      top: 6px;
      left: 6px;
      width: 32px;
      height: 32px;
      background: white;
      border-radius: 50%;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.15);
      transition: .22s ease;
    }

    .toggle-switch input:checked + .toggle-track {
      background: #ede9fe;
      border-color: #c4b5fd;
    }

    .toggle-switch input:checked + .toggle-track .toggle-thumb {
      left: 68px;
    }

    .toggle-labels {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
      padding: 0 4px;
    }

    .bookmark-card .bookmark-top,
    .action-card .bookmark-top {
      align-items: center;
    }

    .small-btn {
      padding: 8px 12px;
      border-radius: 12px;
      background: #fff;
    }

    .small-btn.danger {
      color: var(--danger);
      border-color: #fecaca;
      background: #fff5f5;
    }

    .small-btn.primary {
      color: white;
      background: var(--brand);
      border-color: var(--brand);
    }

    .small-btn:disabled {
      cursor: default;
      color: #475569;
      background: #e2e8f0;
      border-color: #cbd5e1;
      box-shadow: none;
      transform: none;
    }

    .detail-header {
      display: grid;
      gap: 14px;
    }

    .word-line {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .word-icon {
      width: 56px;
      height: 56px;
      border-radius: 18px;
      background: linear-gradient(135deg, #dbeafe, #eff6ff);
      display: grid;
      place-items: center;
      font-size: 28px;
      flex-shrink: 0;
    }

    .detail-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-left: auto;
    }

    .detail-actions .icon-btn {
      width: 64px;
      min-height: 64px;
      padding: 8px 6px;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      font-size: 18px;
      line-height: 1;
    }

    .detail-actions .icon-btn span:last-child {
      font-size: 10px;
      font-weight: 700;
      line-height: 1.1;
      text-align: center;
    }

    .info-list {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 16px;
      background: var(--surface-2);
      font-size: 14px;
    }

    .info-row span {
      font-weight: 700;
    }

    .info-row strong {
      font-weight: 400;
      text-align: right;
    }

    .expert-card {
      background: linear-gradient(180deg, #faf7ff, #ffffff);
      border-color: #ddd6fe;
    }

    .related-list {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .list-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 13px 14px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: white;
      cursor: pointer;
      transition: .18s ease;
    }

    .list-row > :first-child {
      min-width: 0;
    }

    .word-row {
      align-items: flex-start;
    }

    .word-row .word-copy {
      min-width: 0;
    }

    .word-row .word-copy strong {
      display: block;
      font-size: 22px;
      font-weight: 600;
      line-height: 1.2;
    }

    .word-row .word-definition {
      margin-top: 4px;
      font-size: 14px;
      line-height: 1.35;
      color: var(--text);
    }

    .word-row .inline-actions {
      flex-direction: column;
      align-items: flex-end;
      flex-shrink: 0;
      max-width: 140px;
    }

    .word-row .warning-badge {
      max-width: 100%;
      text-align: center;
      white-space: normal;
      line-height: 1.3;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.45);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 50;
    }

    .modal-backdrop.show { display: flex; }

    .modal {
      width: min(420px, 100%);
      background: white;
      border-radius: 24px;
      border: 1px solid var(--border);
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.25);
      padding: 20px;
    }

    .modal h3 {
      margin: 0 0 8px;
      font-size: 24px;
      letter-spacing: -0.03em;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    .footer-nav {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 16px;
      border: 1px solid rgba(216, 222, 233, 0.9);
      border-radius: 28px;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(10px);
      box-shadow: 0 16px 36px rgba(15, 23, 42, 0.14);
      padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      z-index: 2;
      box-sizing: border-box;
    }

    .footer-nav > * {
      min-width: 0;
    }

    .nav-item {
      border: 1px solid var(--border);
      background: white;
      border-radius: 18px;
      min-height: 76px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      color: var(--muted);
      cursor: pointer;
      transition: .18s ease;
      font-size: 11px;
      font-weight: 700;
      min-width: 0;
      text-align: center;
    }

    .nav-item .nav-icon {
      font-size: 20px;
      line-height: 1;
    }

    .nav-item span:last-child {
      line-height: 1.15;
      max-width: 100%;
      white-space: normal;
      text-wrap: balance;
    }

    .back-row {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 10px;
      cursor: pointer;
    }

    .range-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 8px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--brand);
    }

    .empty-state {
      text-align: center;
      padding: 24px 18px;
      color: var(--muted);
      border: 1px dashed var(--border);
      border-radius: 20px;
      background: rgba(255,255,255,0.75);
    }

    .phone-toast-layer {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 106px;
      display: grid;
      justify-items: center;
      gap: 10px;
      pointer-events: none;
      z-index: 3;
    }

    .phone-toast {
      max-width: min(320px, 100%);
      background: rgba(17, 24, 39, 0.92);
      color: white;
      padding: 12px 16px;
      border-radius: 999px;
      font-size: 14px;
      text-align: center;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.25);
    }

    @media (max-width: 980px) {
      .phone {
        position: relative;
        top: 0;
      }
    }

    @media (max-width: 420px) {
      body { padding: 10px; }
      .phone { height: 100vh; max-height: 820px; border-radius: 26px; }
      .collection-grid { grid-template-columns: 1fr; }
      .footer-nav { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="phone" aria-label="Vocabulary Explorer mobile prototype">
      <div>
        <div class="status">
          <span>9:41</span>
          <span>􀙇 􀛨 100%</span>
        </div>
        <header class="header">
          <div class="brand">
            <div class="logo">VE</div>
            <div class="brand-text">
              <h1>Vocabulary Explorer</h1>
              <p id="modeHeader">Basic mode for learners and teachers</p>
            </div>
          </div>
          <div class="header-mode" aria-label="Mode switch">
            <div class="header-mode-label">
              <strong id="headerModeLabel">Basic</strong>
              <span>Mode</span>
            </div>
            <label class="toggle-switch" for="headerModeToggle">
              <input id="headerModeToggle" type="checkbox" aria-label="Toggle expert mode" />
              <span class="toggle-track"><span class="toggle-thumb"></span></span>
            </label>
          </div>
        </header>
      </div>

      <main class="screen" id="screen"></main>
      <div class="phone-toast-layer" id="toastLayer" aria-live="polite" aria-atomic="true"></div>

      <nav class="footer-nav" aria-label="Primary navigation">
        <button class="nav-item" data-nav="search">
          <span class="nav-icon">🔍</span>
          <span>Search</span>
        </button>
        <button class="nav-item" data-nav="explore">
          <span class="nav-icon">💡</span>
          <span>Explore Collections</span>
        </button>
        <button class="nav-item" data-nav="settings">
          <span class="nav-icon">⚙️</span>
          <span>Settings</span>
        </button>
        <button class="nav-item" data-nav="bookmarks">
          <span class="nav-icon">📁</span>
          <span>Saved Collections</span>
        </button>
      </nav>
    </div>

  </div>

  <div class="modal-backdrop" id="modalBackdrop" aria-hidden="true">
    <div class="modal" id="modal"></div>
  </div>

  <script>
    const state = {
      mode: 'basic',
      screen: 'search',
      previousScreen: 'search',
      searchQuery: '',
      selectedWord: null,
      selectedCollection: null,
      editingCollectionId: null,
      audioSource: 'Maskwacîs',
      scriptStyle: 'Roman orthography',
      displayMode: 'System default',
      morphemeBoundaries: 'Show on expert pages',
      inflectionCategories: 'Expanded labels',
      textSize: 18,
      bookmarks: [
        {
          id: 'basic-colors',
          title: 'Basic Colors',
          description: 'Starter lesson set for beginner colour vocabulary.',
          words: ['wâpiskâw', 'osâwâw', 'mikosiw']
        },
        {
          id: 'body-parts',
          title: 'Body Parts',
          description: 'Classroom-friendly body part vocabulary for review and lesson planning.',
          words: ['mistikwân', 'mîciwan', 'sîpihk', 'nâpêw-iskwêw']
        }
      ]
    };

    const words = {
      mistikwân: {
        cree: 'mistikwân',

      if (!q) return [];

        return [

          { type: 'word', id: 'maskwa', title: 'maskwa', note: 'Bear vocabulary entry in the Animals collection.', count: 1 }
        ];
      }
      if (q.includes('body')) {
        return [
          { type: 'collection', id: 'body-parts', title: 'Body Parts', note: 'A classroom-friendly collection with audio and short descriptions.', count: 20 },
          { type: 'collection', id: 'movement-body', title: 'Action words for body parts', note: 'Movement and action vocabulary tied to anatomy.', count: 12 }
        ];
      }
      if (q.includes('mîhwanisô') || q.includes('mihwaniso')) {
        return [
          { type: 'word', id: 'mihwanisô', title: 'Mîhwanisô', note: 'No direct English translation. Expert users can inspect semantic relations and sources.', count: 3 }
        ];
      }
      const matchedWords = Object.entries(words)
        .filter(([key, word]) =>
          key.toLowerCase().includes(q) ||
          word.cree.toLowerCase().includes(q) ||
          word.english.toLowerCase().includes(q)
        )
        .slice(0, 6)
        .map(([key, word]) => ({
          type: 'word',
          id: key,
          title: word.cree,
          note: word.semanticGap ? 'No direct English translation. Expert users can inspect semantic relations and sources.' : word.english + '.',
          count: 1
        }));
      if (matchedWords.length) {
        const collectionIdByTitle = {
          'Animals': 'animals',
          'Body Parts': 'body-parts',
          'Basic Colors': 'colors',
          'Nature': 'nature'
        };
        const matchedCollections = [...new Set(
          matchedWords.flatMap(result => (words[result.id]?.collections || []))
        )]
          .filter(name => collectionIdByTitle[name])
          .map(name => ({
            type: 'collection',
            id: collectionIdByTitle[name],
            title: name,
            note: `Collection containing ${q}.`,
            count: (getCollectionData(collectionIdByTitle[name]).words || []).length
          }));
        return [...matchedWords, ...matchedCollections];
      }
      return [
        { type: 'collection', id: 'nature', title: 'Nature', note: 'Pre-made set for land-based and environmental vocabulary.', count: 22 },
        { type: 'word', id: 'mistikwân', title: 'mistikwân', note: 'A body-part term found in multiple lesson sets.', count: 3 }
      ];
    }

      if (state.mode === 'expert') {
        document.getElementById('sourceBtn').addEventListener('click', () => showSourceModal(w));
        document.getElementById('infoBtn').addEventListener('click', () => toast('Expanded lexical notes are visible in the expert detail card.'));
      }
    }

    function renderExplore() {
      screen.innerHTML = `
        <h2 class="section-title">Explore Cree Collections</h2>
        <p class="subtle">Discover ready-made sets for lesson planning, guided learning, and vocabulary exploration.</p>
        <div class="collection-grid">
          ${exploreCollections.map(item => {
            const saved = isCollectionSaved(item);
            const expertExtra = state.mode === 'expert' && (item.id === 'nature' || item.id === 'body-explore')
              ? '<span class="warning-badge">Includes semantic-gap words</span>'
              : `<span class="count-badge">${item.count} words</span>`;
            return `
              <article class="collection-card" data-collection="${item.id}">
                <div>
                  <div class="bookmark-top">
                    <h4>${item.title}</h4>
                    <div class="collection-icon" aria-hidden="true">${item.icon}</div>
                  </div>
                  <p class="subtle">${item.description}</p>
                </div>
                <div class="collection-meta">
                  ${expertExtra}
                  <button class="small-btn save-explore ${saved ? 'primary' : ''}" data-collection="${item.id}" type="button" ${saved ? 'disabled' : ''}>${saved ? 'Saved' : 'Save'}</button>
                </div>
              </article>
            `;
          }).join('')}
        </div>
      `;

      setContext('The explore screen follows the low-fi two-column grid of topic collections and uses a save action to support bookmark workflows for teachers and learners.');

      document.querySelectorAll('.collection-card').forEach(card => {
        card.addEventListener('click', (e) => {
          if (e.target.closest('.save-explore')) return;
          openCollection(card.dataset.collection);
        });
      });
      document.querySelectorAll('.save-explore').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          const item = exploreCollections.find(c => c.id === btn.dataset.collection);
          if (item.id === 'animals') {
            confirmSaveCollection({ title: item.title, id: item.id, description: item.description, words: getCollectionData(item.id).words });
            return;
          }
          confirmSaveCollection({ title: item.title, id: item.id, description: item.description, words: item.id === 'body-explore' ? ['mistikwân', 'mîciwan', 'sîpihk'] : ['sîpihk', 'wâpiskâw'] });
        });
      });
    }

    function renderSettings() {
      const isExpert = state.mode === 'expert';
      screen.innerHTML = `
        <div class="back-row" id="backFromSettings">← Back</div>
        <h2 class="section-title">Settings</h2>
        <p class="subtle">Adjust readability, pronunciation, and how much linguistic detail appears.</p>
        <div class="settings-card settings-stack">
          <div class="setting-group">
            <h3>Text size</h3>
            <div class="range-row">
              <span style="font-size:14px;">Aa</span>
              <input id="textSizeRange" type="range" min="14" max="24" value="${state.textSize}" />
              <span style="font-size:24px;">Aa</span>
            </div>
            <p class="subtle">Current size: ${state.textSize}px</p>
          </div>

          <div class="setting-group">
            <h3>${isExpert ? 'Display mode' : 'Show Plains Cree words in'}</h3>
            <div class="choice-list" id="displayChoices"></div>
          </div>

          <div class="setting-group">
            <div class="toggle-row">
              <div>
                <h3 style="margin-bottom:6px;">Mode</h3>
                <p class="subtle" style="margin:0;">Switch between basic and expert views.</p>
              </div>
              <div>
                <label class="toggle-switch" for="modeToggle">
                  <input id="modeToggle" type="checkbox" aria-label="Toggle mode" ${isExpert ? 'checked' : ''} />
                  <span class="toggle-track"><span class="toggle-thumb"></span></span>
                </label>
                <div class="toggle-labels"><span>Basic</span><span>Expert</span></div>
              </div>
            </div>
          </div>

          ${isExpert ? `
            <div class="setting-group">
              <h3>Morpheme boundaries</h3>
              <div class="choice-list" id="morphemeChoices"></div>
            </div>
            <div class="setting-group">
              <h3>Inflection categories</h3>
              <div class="choice-list" id="inflectionChoices"></div>
            </div>
          ` : `
            <div class="setting-group">
              <h3>Emoji for animate nouns</h3>
              <div class="choice-list" id="emojiChoices"></div>
            </div>
            <div class="setting-group">
              <h3>Dictionary source</h3>
              <div class="choice-list" id="audioChoices"></div>
            </div>
          `}
        </div>
      `;

      setContext(isExpert
        ? 'The expert settings page adds morpheme-boundary and inflection-category controls while preserving the same grouped form structure.'
        : 'The basic settings page focuses on readability, audio source, and a simple mode switch, reflecting the paper prototype’s low-complexity options.');

      document.getElementById('backFromSettings').addEventListener('click', () => {
        state.screen = state.previousScreen || 'search';
        render();
      });
      document.getElementById('textSizeRange').addEventListener('input', e => {
        state.textSize = Number(e.target.value);
        document.documentElement.style.setProperty('--baseText', `${state.textSize}px`);
        renderSettings();
      });
      document.getElementById('modeToggle').addEventListener('change', (e) => {
        state.mode = e.target.checked ? 'expert' : 'basic';
        render();
      });

      const displayOptions = isExpert
        ? ['System default', 'Dense research layout', 'Reader-friendly']
        : ['Roman orthography', 'Syllabics', 'Both'];
      mountChoices('displayChoices', displayOptions, isExpert ? state.displayMode : state.scriptStyle, (value) => {
        if (isExpert) state.displayMode = value; else state.scriptStyle = value;
      });

      if (isExpert) {
        mountChoices('morphemeChoices', ['Hide', 'Show on expert pages', 'Always show'], state.morphemeBoundaries, (value) => state.morphemeBoundaries = value);
        mountChoices('inflectionChoices', ['Short labels', 'Expanded labels', 'Table view'], state.inflectionCategories, (value) => state.inflectionCategories = value);
      } else {
        mountChoices('emojiChoices', ['Show emoji hints', 'Hide emoji hints'], 'Show emoji hints', () => {});
        mountChoices('audioChoices', ['Maskwacîs', 'nêhiyawêwin Dictionary', 'Classroom default'], state.audioSource, (value) => state.audioSource = value);
      }
    }

    function mountChoices(id, options, current, onSelect) {
      const mount = document.getElementById(id);
      if (!mount) return;
      mount.innerHTML = options.map(opt => `
        <button class="choice ${opt === current ? 'selected' : ''}" data-value="${escapeHtml(opt)}" type="button">
          <span class="radio"></span>
          <span>${escapeHtml(opt)}</span>
        </button>
      `).join('');
      mount.querySelectorAll('.choice').forEach(btn => {
        btn.addEventListener('click', () => {
          onSelect(btn.dataset.value);
          renderSettings();
        });
      });
    }

    function renderBookmarks() {
      screen.innerHTML = `
        <div class="back-row" id="backBookmarks">← Back</div>
        <h2 class="section-title" style="margin-top:0;">My Bookmarks</h2>
        <p class="subtle">Saved classroom sets and personal review collections live here.</p>
        <div class="action-card" id="createNewSet">
          <div class="bookmark-top">
            <h4>＋ Create New Set</h4>
            <span class="mode-badge">Custom</span>
          </div>
          <p class="subtle">Create a reusable collection for lesson planning or personal study.</p>
        </div>
        <div class="bookmarks-list">
          ${state.bookmarks.map(set => `
            <article class="bookmark-card" data-bookmark="${set.id}">
              <div class="bookmark-top">
                <div>
                  <h4>${escapeHtml(set.title)}</h4>
                  <p class="subtle">${escapeHtml(set.description)}</p>
                </div>
                <button class="small-btn edit-set" data-bookmark="${set.id}" type="button">Edit</button>
              </div>
            </article>
          `).join('')}
        </div>
      `;

      setContext('The bookmarks page follows the folder metaphor from the paper prototype, collecting saved and self-made sets in one place.');

      document.getElementById('backBookmarks').addEventListener('click', () => {
        state.screen = 'search';
        render();
      });
      document.getElementById('createNewSet').addEventListener('click', showCreateSetModal);
      document.querySelectorAll('.bookmark-card').forEach(card => {
        card.addEventListener('click', (e) => {
          if (e.target.closest('.edit-set')) return;
          state.editingCollectionId = card.dataset.bookmark;
          state.screen = 'edit-bookmark';
          render();
        });
      });
      document.querySelectorAll('.edit-set').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          state.editingCollectionId = btn.dataset.bookmark;
          state.screen = 'edit-bookmark';
          render();
        });
      });
    }

    function renderEditBookmark() {
      const set = state.bookmarks.find(b => b.id === state.editingCollectionId) || state.bookmarks[0];
      screen.innerHTML = `
        <div class="back-row" id="backToBookmarks">← Back to bookmarks</div>
        <div class="detail-card">
          <div class="detail-top">
            <div>
              <h2>${escapeHtml(set.title)}</h2>
              <p class="subtle">Edit the set name, review descriptions, and manage included words.</p>
            </div>
            <button class="small-btn danger" id="deleteSetBtn">Delete set</button>
          </div>
          <div class="stack" style="margin-top:14px;">
            <label>
              <span class="subtle">Set name</span>
              <div class="search-box" style="margin-top:8px;"><input class="inline-input" id="setNameInput" value="${escapeHtml(set.title)}"></div>
            </label>
            <label>
              <span class="subtle">Description</span>
              <textarea id="setDescInput">${escapeHtml(set.description)}</textarea>
            </label>
          </div>
        </div>
        <div class="panel" style="margin-top:16px;">
          <h3>Words in this set</h3>
          <div class="related-list">
            ${set.words.map(wordKey => {
              const w = words[wordKey] || { cree: wordKey, description: 'Saved vocabulary item.' };
              return `
                <div class="list-row editable-word-row" data-word="${wordKey}">
                  <div>
                    <strong>${escapeHtml(w.cree)}</strong>
                    <div class="subtle">${escapeHtml(w.description)}</div>
                  </div>
                  <div class="inline-actions">
                    <button class="icon-btn edit-audio" data-word="${wordKey}" title="Play audio">🔊</button>
                    <button class="small-btn danger remove-word" data-word="${wordKey}" type="button">Remove</button>
                  </div>
                </div>
              `;
            }).join('')}
          </div>
          <div class="modal-actions" style="justify-content:flex-start; margin-top:14px;">
            <button class="small-btn primary" id="saveSetChanges">Save changes</button>
          </div>
        </div>
      `;

      setContext('The saved-set editor matches the low-fi screens by combining editable metadata with a list of words and remove actions.');

      document.getElementById('backToBookmarks').addEventListener('click', () => {
        state.screen = 'bookmarks';
        render();
      });
      document.getElementById('saveSetChanges').addEventListener('click', () => {
        set.title = document.getElementById('setNameInput').value.trim() || set.title;
        set.description = document.getElementById('setDescInput').value.trim() || set.description;
        toast('Set changes saved.');
        renderEditBookmark();
      });
      document.getElementById('deleteSetBtn').addEventListener('click', () => confirmDeleteSet(set.id));
      document.querySelectorAll('.remove-word').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          confirmRemoveWord(set.id, btn.dataset.word);
        });
      });
      document.querySelectorAll('.edit-audio').forEach(btn => btn.addEventListener('click', e => {
        e.stopPropagation();
        toast(`Playing ${words[btn.dataset.word]?.cree || btn.dataset.word}.`);
      }));
      document.querySelectorAll('.editable-word-row').forEach(row => {
        row.addEventListener('click', (e) => {
          if (e.target.closest('.remove-word') || e.target.closest('.edit-audio')) return;
          openWord(row.dataset.word);
        });
      });
    }

    function openWord(key) {
      state.selectedWord = key;
      state.screen = 'word';
      render();
    }

    function confirmSaveCollection(collection) {
      openModal(`
        <h3>Add to Collection?</h3>
        <p class="subtle">Do you want to add <strong>${escapeHtml(collection.title)}</strong> to your bookmarks?</p>
        <div class="modal-actions">
          <button class="small-btn" id="cancelModal">Cancel</button>
          <button class="small-btn primary" id="confirmSaveCollection">Yes, save</button>
        </div>
      `);
      document.getElementById('cancelModal').addEventListener('click', closeModal);
      document.getElementById('confirmSaveCollection').addEventListener('click', () => {
        const exists = isCollectionSaved(collection);
        const collectionWords = collection.id ? getCollectionData(collection.id).words : collection.words;
        if (!exists) {
          state.bookmarks.push({
            id: collection.id || slugify(collection.title),
            title: collection.title,
            description: collection.description || 'Saved from the Explore page.',
            words: collection.words || ['mistikwân', 'mîciwan']
          });
        }
        closeModal();
        toast(exists ? `${collection.title} is already saved.` : `${collection.title} saved to your collections.`);
        render();
      });
    }

    function showAddWordModal(wordKey) {
      const w = words[wordKey];
      openModal(`
        <h3>Add word to set</h3>
        <p class="subtle">Choose where to save <strong>${escapeHtml(w.cree)}</strong>.</p>
        <label class="subtle" for="wordSetSelect">Collection</label>
        <select id="wordSetSelect" style="margin-top:8px; width:100%; padding:12px 14px; border-radius:16px; border:1px solid var(--border); font:inherit;">
          ${state.bookmarks.map(set => `<option value="${set.id}" ${set.words.includes(wordKey) ? 'disabled' : ''}>${escapeHtml(set.title)}${set.words.includes(wordKey) ? ` (${escapeHtml(w.cree)} already saved)` : ''}</option>`).join('')}
        </select>
        <div class="modal-actions">
          <button class="small-btn" id="cancelModal">Cancel</button>
          <button class="small-btn primary" id="confirmAddWord">Add word</button>
        </div>
      `);
      document.getElementById('cancelModal').addEventListener('click', closeModal);
      const wordSetSelect = document.getElementById('wordSetSelect');
      const firstEnabledOption = [...wordSetSelect.options].find(option => !option.disabled);
      if (firstEnabledOption) {
        wordSetSelect.value = firstEnabledOption.value;
      }
      document.getElementById('confirmAddWord').addEventListener('click', () => {
        const setId = wordSetSelect.value;
        const set = state.bookmarks.find(b => b.id === setId);
        if (set && set.words.includes(wordKey)) {
          closeModal();
          toast(`${w.cree} is already in ${set.title}.`);
          return;
        }
        if (set) set.words.push(wordKey);
        closeModal();
        toast(`${w.cree} added to ${set.title}.`);
      });
    }

    function showSourceModal(word) {
      openModal(`
        <h3>Published works and sources</h3>
        <p class="subtle">This mirrors the expert storyboard, where a book/source action leads to supporting materials for deeper lexical investigation.</p>
        <div class="related-list" style="margin-top:14px;">
          ${word.sources.map(src => `<div class="list-row"><span>${escapeHtml(src)}</span><span class="count-badge">Open</span></div>`).join('')}
        </div>
        <div class="modal-actions">
          <button class="small-btn primary" id="closeSourceModal">Done</button>
        </div>
      `);
      document.getElementById('closeSourceModal').addEventListener('click', closeModal);
    }

    function confirmRemoveWord(setId, wordKey) {
      const set = state.bookmarks.find(b => b.id === setId);
      const label = words[wordKey]?.cree || wordKey;
      openModal(`
        <h3>Warning</h3>
        <p class="subtle">Are you sure you want to remove <strong>${escapeHtml(label)}</strong> from <strong>${escapeHtml(set.title)}</strong>?</p>
        <div class="modal-actions">
          <button class="small-btn" id="cancelModal">Cancel</button>
          <button class="small-btn danger" id="confirmRemoveWord">Remove</button>
        </div>
      `);
      document.getElementById('cancelModal').addEventListener('click', closeModal);
      document.getElementById('confirmRemoveWord').addEventListener('click', () => {
        set.words = set.words.filter(w => w !== wordKey);
        closeModal();
        renderEditBookmark();
      });
    }

    function confirmDeleteSet(setId) {
      const set = state.bookmarks.find(b => b.id === setId);
      openModal(`
        <h3>Delete set?</h3>
        <p class="subtle">This will permanently remove <strong>${escapeHtml(set.title)}</strong> from your bookmarks.</p>
        <div class="modal-actions">
          <button class="small-btn" id="cancelModal">Cancel</button>
          <button class="small-btn danger" id="confirmDeleteSet">Delete set</button>
        </div>
      `);
      document.getElementById('cancelModal').addEventListener('click', closeModal);
      document.getElementById('confirmDeleteSet').addEventListener('click', () => {
        state.bookmarks = state.bookmarks.filter(b => b.id !== setId);
        closeModal();
        state.screen = 'bookmarks';
        render();
      });
    }

    function showCreateSetModal() {
      openModal(`
        <h3>Create new set</h3>
        <p class="subtle">Make a custom collection for classroom planning or personal review.</p>
        <label class="subtle">Set name</label>
        <div class="search-box" style="margin-top:8px;"><input id="newSetName" placeholder="e.g., Nature Review"></div>
        <label class="subtle" style="display:block; margin-top:10px;">Description</label>
        <textarea id="newSetDesc" placeholder="Short description"></textarea>
        <div class="modal-actions">
          <button class="small-btn" id="cancelModal">Cancel</button>
          <button class="small-btn primary" id="createSetConfirm">Create set</button>
        </div>
      `);
      document.getElementById('cancelModal').addEventListener('click', closeModal);
      document.getElementById('createSetConfirm').addEventListener('click', () => {
        const name = document.getElementById('newSetName').value.trim();
        if (!name) return;
        state.bookmarks.unshift({
          id: slugify(name),
          title: name,
          description: document.getElementById('newSetDesc').value.trim() || 'Custom set',
          words: []
        });
        closeModal();
        toast(`${name} created.`);
        renderBookmarks();
      });
    }

    function toast(message) {
      const toastEl = document.createElement('div');
      toastEl.className = 'phone-toast';
      toastEl.textContent = message;
      toastLayer.appendChild(toastEl);
      setTimeout(() => {
        toastEl.remove();
      }, 1800);
    }

    function slugify(text) {
      return text.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function render() {
      updateHeader();
      switch (state.screen) {
        case 'search': renderSearch(); break;
        case 'results': renderResults(); break;
        case 'explore': renderExplore(); break;
        case 'collection': renderCollection(); break;
        case 'word': renderWordDetail(); break;
        case 'settings': renderSettings(); break;
        case 'bookmarks': renderBookmarks(); break;
        case 'edit-bookmark': renderEditBookmark(); break;
        default: renderSearch();
      }
    }

    render();
  </script>
</body>
</html>
